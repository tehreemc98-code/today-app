};
function getDateLabel(k){const n=new Date();if(k==='today')return 'Today';if(k==='tomorrow'){const t=new Date(n);t.setDate(t.getDate()+1);return t.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}if(k==='weekend')return 'This Weekend';if(k==='week')return 'This Week';return 'Today';}
function getDateISO(k){const n=new Date();if(k==='today')return n.toISOString().split('T')[0];if(k==='tomorrow'){const t=new Date(n);t.setDate(t.getDate()+1);return t.toISOString().split('T')[0];}if(k==='weekend'){const d=n.getDay(),diff=d===6?0:(6-d),s=new Date(n);s.setDate(n.getDate()+diff);return s.toISOString().split('T')[0];}if(k==='week'){const m=new Date(n),d=n.getDay();m.setDate(n.getDate()-(d===0?6:d-1));return m.toISOString().split('T')[0];}return n.toISOString().split('T')[0];}
function onHoodChange(){
  const sel=document.getElementById('hood-select').value;
  if(!sel){clearLocation();return;}
  const parts=sel.split('|');
  currentHood=parts[0];
  currentLat=parseFloat(parts[2]);
  currentLng=parseFloat(parts[3]);
  document.getElementById('clear-hood-btn').classList.add('visible');
  doSearch();
}
function onPostalInput(){
  const raw=document.getElementById('postal-input').value.replace(/\s/g,'').toUpperCase();
  if(raw.length>=3){
    const prefix=raw.substring(0,3);
    const hood=POSTAL_HOOD[prefix];
    if(hood){
      currentHood=hood;
      const coords=HOOD_COORDS[hood];
      if(coords){currentLat=coords[0];currentLng=coords[1];}
      document.getElementById('hood-select').value=Object.values([...document.querySelectorAll('#hood-select option')]).find(o=>o.value.startsWith(hood+'|'))?.["value"]||'';
      document.getElementById('clear-hood-btn').classList.add('visible');
      if(raw.length>=6)doSearch();
    }
  }
}
function clearLocation(){
  currentHood='';currentLat=51.0447;currentLng=-114.0719;
  document.getElementById('hood-select').value='';
  document.getElementById('postal-input').value='';
  document.getElementById('clear-hood-btn').classList.remove('visible');
  document.getElementById('hood-badge').classList.remove('visible');
  if(allEvents.length)renderEvents();
}
function setDate(k,btn){currentDate=k;document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');doSearch();}
function setView(v){currentView=v;document.getElementById('btn-grid').classList.toggle('active',v==='grid');document.getElementById('btn-list').classList.toggle('active',v==='list');document.getElementById('events-grid').classList.toggle('list-view',v==='list');}
function handleKey(e){if(e.key==='Enter')doSearch();}
function quickSearch(q){document.getElementById('search-input').value=q;doSearch();}
function filterBy(cat,btn){currentFilter=cat;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');renderEvents();}
function buildEventLink(e){if(e.url&&e.url.startsWith('http'))return e.url;return 'https://www.google.com/search?q='+encodeURIComponent((e.name||'')+' '+(e.venue||'')+' Calgary');}
function getEventCoords(e){
  const hood=e.neighbourhood||e.area||'';
  const coords=HOOD_COORDS[hood];
  if(coords){
    const jitter=(Math.random()-0.5)*0.004;
    return[coords[0]+jitter,coords[1]+jitter];
  }
  return[51.0447+(Math.random()-0.5)*0.04,-114.0719+(Math.random()-0.5)*0.06];
}
function toggleMap(){
  const mapEl=document.getElementById('map-container');
  const btn=document.getElementById('btn-map');
  const isVisible=mapEl.classList.toggle('visible');
  btn.classList.toggle('active',isVisible);
  if(isVisible){
    if(!mapInstance){
      mapInstance=L.map('map',{zoomControl:true}).setView([currentLat,currentLng],13);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
        attribution:'&copy; <a href="https://carto.com">CARTO</a>',
        subdomains:'abcd',maxZoom:19
      }).addTo(mapInstance);
    } else {
      mapInstance.setView([currentLat,currentLng],13);
      setTimeout(()=>mapInstance.invalidateSize(),200);
    }
    renderMapMarkers();
  }
}
function renderMapMarkers(){
  if(!mapInstance)return;
  mapMarkers.forEach(m=>m.remove());
  mapMarkers=[];
  const events=currentFilter==='all'?allEvents:allEvents.filter(e=>{
    if(currentFilter==='free')return(e.price||'').toLowerCase()==='free';
    return[(e.category||''),...(e.tags||[]),(e.name||'')].join(' ').toLowerCase().includes(currentFilter);
  });
  events.forEach(e=>{
    const coords=getEventCoords(e);
    const icon=ICONS[(e.category||'').toLowerCase()]||ICONS.default;
    const divIcon=L.divIcon({className:'',html:'<div style="background:#3a5c2e;border:2px solid #a8cc88;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.5)">'+icon+'</div>',iconSize:[32,32],iconAnchor:[16,16]});
    const link=buildEventLink(e);
    const isFree=!e.price||e.price.toLowerCase()==='free';
    const popup='<div class="map-popup"><h4>'+e.name+'</h4><p>'+((e.venue||'')+(e.neighbourhood?' · '+e.neighbourhood:''))+'</p><p>'+(e.time||'')+(isFree?' · <b style=\"color:#2a6627\">Free</b>':e.price?' · <b>'+e.price+'</b>':'')+'</p><a href="'+link+'" target="_blank">View event ↗</a></div>';
    const marker=L.marker(coords,{icon:divIcon}).addTo(mapInstance).bindPopup(popup);
    mapMarkers.push(marker);
  });
  if(events.length&&mapMarkers.length){
    const group=L.featureGroup(mapMarkers);
    mapInstance.fitBounds(group.getBounds().pad(0.15));
  }
}
function renderEvents(){
  const grid=document.getElementById('events-grid');
  let events=currentFilter==='all'?allEvents:allEvents.filter(e=>{
    if(currentFilter==='free')return(e.price||'').toLowerCase()==='free';
    return[(e.category||''),...(e.tags||[]),(e.name||'')].join(' ').toLowerCase().includes(currentFilter);
  });
  const dateLabel=getDateLabel(currentDate);
  document.getElementById('results-count').textContent=events.length+' events · '+dateLabel;
  const hoodBadge=document.getElementById('hood-badge');
  if(currentHood){hoodBadge.textContent='📍 '+currentHood;hoodBadge.classList.add('visible');}else{hoodBadge.classList.remove('visible');}
  if(!events.length){grid.innerHTML='<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-title">No events for this filter</div><div class="empty-sub">Try a different category</div></div>';return;}
  grid.innerHTML=events.map((e,i)=>{
    const icon=ICONS[(e.category||'').toLowerCase()]||ICONS.default;
    const tags=(e.tags||[]).slice(0,3).map(t=>'<span class="tag">#'+t+'</span>').join('');
    const isFree=!e.price||e.price.toLowerCase()==='free';
    const link=buildEventLink(e);
    const dl=currentDate==='today'?'Today':dateLabel;
    return '<a class="event-card" href="'+link+'" target="_blank" rel="noopener noreferrer">'+
      '<div class="card-top"><div class="card-category"><div class="cat-icon">'+icon+'</div><div><div class="cat-label">'+(e.category||'Event')+'</div><div class="cat-location">'+(e.neighbourhood||e.area||'Calgary')+'</div></div></div>'+
      '<div class="card-badges">'+(i<4||e.hot?'<div class="badge-hot">🔥</div>':'')+'</div></div>'+
      '<div class="card-body"><div class="event-name">'+e.name+'</div>'+(e.description?'<div class="event-desc">'+e.description+'</div>':'')+(tags?'<div class="event-tags">'+tags+'</div>':'')+'</div>'+
      '<div class="card-footer"><div><div class="event-venue">'+(e.venue||e.location||'')+'</div><div class="event-time">'+dl+' · '+(e.time||'')+'</div><div class="event-link-hint">↗ View event</div></div>'+
      '<div class="event-price '+(isFree?'':'paid')+'">'+(isFree?'Free':e.price)+'</div></div></a>';
  }).join('');
  if(document.getElementById('map-container').classList.contains('visible'))renderMapMarkers();
}
async function doSearch(){
  const q=document.getElementById('search-input').value.trim()||'all events';
  const btn=document.getElementById('search-btn');
  const grid=document.getElementById('events-grid');
  const filterBar=document.getElementById('filter-bar');
  const resultsHeader=document.getElementById('results-header');
  btn.disabled=true;filterBar.style.display='none';resultsHeader.style.display='none';
  const dl=getDateLabel(currentDate);
  const sources=['Google Events','Eventbrite','Meetup','Lu.ma','Tourism YYC','Facebook','Ticketmaster','Reddit YYC','Live Nation','Arts Commons','Calgary Parks','Community Board'];
  const hoodNote=currentHood?' in '+currentHood:'';
  grid.innerHTML='<div class="loading-state"><div class="spinner"></div><div class="loading-title">Finding events for '+dl+'...</div><div class="loading-sub">Checking live sources for "'+q+'"'+hoodNote+' in Calgary</div><div class="source-chips">'+sources.map(s=>'<div class="source-chip" id="sc-'+s.replace(/[^a-z]/gi,'')+'">'+s+'</div>').join('')+'</div></div>';
  let d=0;for(const s of sources){setTimeout(()=>{const el=document.getElementById('sc-'+s.replace(/[^a-z]/gi,''));if(el)el.classList.add('done');},d);d+=160;}
  try{
    const res=await fetch('/api/scrape',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({city:'Calgary',query:q,date:getDateISO(currentDate),dateRange:currentDate,neighbourhood:currentHood})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    allEvents=data.events||[];currentFilter='all';
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    document.querySelector('.filter-chip').classList.add('active');
    filterBar.style.display='flex';resultsHeader.style.display='flex';renderEvents();
  }catch(err){
    grid.innerHTML='<div class="error-msg">⚠️ '+(err.message||'Could not load events.')+'</div>';
  }
  btn.disabled=false;
}
</script>
</body>
