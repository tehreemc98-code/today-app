<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>today. — Calgary Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green-dark: #1e2f1a; --green-mid: #253d1f; --green-card: #28391f; --green-hover: #2f4a27; --cream: #f0ede6; --cream2: #e4e0d8; --text-dark: #1a2410; --text-muted: #6b7c5e; --text-light: rgba(255,255,255,0.5); --tag-bg: #e4ecd8; --tag-text: #3a5030; --price-green: #2a6627; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--green-dark); color: #fff; min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; background: var(--green-dark); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .nav-logo { font-family: 'Instrument Serif', Georgia, serif; font-size: 22px; font-weight: 400; color: #fff; letter-spacing: -0.5px; }
    .nav-logo span { opacity: 0.35; }
    .view-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.07); border-radius: 10px; padding: 3px; }
    .view-btn { padding: 6px 14px; border-radius: 7px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; color: rgba(255,255,255,0.45); background: transparent; transition: all 0.15s; font-family: inherit; }
    .view-btn.active { background: var(--cream); color: var(--text-dark); }
    .hero { text-align: center; padding: 60px 24px 44px; }
    .hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 18px; }
    .hero-title { font-family: 'Instrument Serif', Georgia, serif; font-size: clamp(80px, 20vw, 130px); font-weight: 400; line-height: 0.88; color: #fff; letter-spacing: -3px; margin-bottom: 22px; }
    .hero-title span { color: rgba(255,255,255,0.3); }
    .hero-sub { font-size: 15px; color: var(--text-light); max-width: 360px; margin: 0 auto 36px; line-height: 1.65; }
    .hero-sub strong { color: rgba(255,255,255,0.8); font-weight: 600; }
    .search-wrap { max-width: 560px; margin: 0 auto; position: relative; }
    .search-bar { width: 100%; padding: 18px 60px 18px 24px; border-radius: 16px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; font-family: inherit; outline: none; backdrop-filter: blur(10px); border: 1.5px solid rgba(255,255,255,0.12); transition: all 0.2s; }
    .search-bar::placeholder { color: rgba(255,255,255,0.35); }
    .search-bar:focus { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.25); }
    .search-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 10px; border: none; background: #3a5c2e; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .search-btn:hover { background: #456b37; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .search-suggestions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .suggestion { padding: 6px 14px; border-radius: 20px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; border: none; }
    .suggestion:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
    .date-filter-bar { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; padding: 20px 24px 0; }
    .date-chip { padding: 7px 18px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.15); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; background: transparent; color: rgba(255,255,255,0.6); }
    .date-chip.active { background: var(--cream); color: var(--text-dark); border-color: var(--cream); }
    .date-chip:hover:not(.active) { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
    .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding: 16px 24px 20px; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 7px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55); }
    .filter-chip.active { background: var(--cream); color: var(--text-dark); }
    .filter-chip:hover:not(.active) { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
    .results-header { padding: 0 24px 14px; display: flex; align-items: center; justify-content: space-between; }
    .results-count { font-size: 13px; color: var(--text-light); }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; padding: 0 24px 60px; }
    .events-grid.list-view { grid-template-columns: 1fr; max-width: 660px; margin: 0 auto; }
    .event-card { background: var(--cream); border-radius: 20px; overflow: hidden; color: var(--text-dark); transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; text-decoration: none; display: block; }
    .event-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
    .card-top { padding: 16px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; }
    .card-category { display: flex; align-items: center; gap: 10px; }
    .cat-icon { width: 38px; height: 38px; border-radius: 9px; background: var(--cream2); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .cat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .cat-location { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .card-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .badge-hot { width: 30px; height: 30px; border-radius: 50%; background: var(--cream2); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .card-body { padding: 2px 16px 14px; }
    .event-name { font-size: 19px; font-weight: 700; line-height: 1.2; letter-spacing: -0.3px; margin-bottom: 7px; }
    .event-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
    .event-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { padding: 3px 10px; border-radius: 20px; background: var(--tag-bg); color: var(--tag-text); font-size: 11px; font-weight: 500; }
    .card-footer { border-top: 1px solid var(--cream2); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
    .event-venue { font-size: 13px; font-weight: 600; }
    .event-time { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .event-link-hint { font-size: 10px; color: #5a7a4a; margin-top: 2px; font-weight: 500; }
    .event-price { font-size: 15px; font-weight: 700; color: var(--price-green); }
    .event-price.paid { color: var(--text-dark); }
    .loading-state { grid-column: 1/-1; text-align: center; padding: 60px 24px; }
    .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.6); animation: spin 0.7s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .loading-sub { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }
    .source-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
    .source-chip { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); transition: all 0.4s; }
    .source-chip.done { background: rgba(80,140,50,0.3); color: rgba(180,230,140,0.9); }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--text-light); }
    .empty-emoji { font-size: 44px; margin-bottom: 14px; }
    .empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: rgba(255,255,255,0.7); }
    .empty-sub { font-size: 14px; }
    .error-msg { grid-column: 1/-1; margin: 0 0 16px; padding: 14px 18px; border-radius: 12px; background: rgba(200,50,50,0.15); border: 1px solid rgba(200,50,50,0.25); color: #ffaaaa; font-size: 14px; }
  </style>
</head>
<body>
<nav>
  <div class="nav-logo">today<span>.</span></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-grid" onclick="setView('grid')">&#x229E; Grid</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')">&#x2261; List</button>
  </div>
</nav>
<div id="hero" class="hero">
  <div class="hero-eyebrow">Calgary &nbsp;&middot;&nbsp; Live Events</div>
  <div class="hero-title">today<span>.</span></div>
  <div class="hero-sub">Everything happening in your city,<br>found <strong>live</strong> across Calgary.</div>
  <div class="search-wrap">
    <input id="search-input" class="search-bar" type="text" placeholder="Search events, venues, neighbourhoods..." onkeydown="handleKey(event)" autocomplete="off" />
    <button class="search-btn" id="search-btn" onclick="doSearch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div class="search-suggestions">
    <button class="suggestion" onclick="quickSearch('live music tonight')">&#127925; Live music tonight</button>
    <button class="suggestion" onclick="quickSearch('free events')">&#10024; Free events</button>
    <button class="suggestion" onclick="quickSearch('food and markets')">&#127869;&#65039; Food &amp; markets</button>
    <button class="suggestion" onclick="quickSearch('outdoor activities')">&#127956;&#65039; Outdoor</button>
    <button class="suggestion" onclick="quickSearch('arts and culture')">&#127912; Arts &amp; culture</button>
  </div>
  <div class="date-filter-bar">
    <button class="date-chip active" onclick="setDate('today',this)">Today</button>
    <button class="date-chip" onclick="setDate('tomorrow',this)">Tomorrow</button>
    <button class="date-chip" onclick="setDate('weekend',this)">This Weekend</button>
    <button class="date-chip" onclick="setDate('week',this)">This Week</button>
  </div>
</div>
<div id="filter-bar" class="filter-bar" style="display:none">
  <button class="filter-chip active" onclick="filterBy('all',this)">All</button>
  <button class="filter-chip" onclick="filterBy('music',this)">&#127925; Music</button>
  <button class="filter-chip" onclick="filterBy('food',this)">&#127869;&#65039; Food</button>
  <button class="filter-chip" onclick="filterBy('arts',this)">&#127912; Arts</button>
  <button class="filter-chip" onclick="filterBy('sports',this)">&#9917; Sports</button>
  <button class="filter-chip" onclick="filterBy('fitness',this)">&#128170; Fitness</button>
  <button class="filter-chip" onclick="filterBy('community',this)">&#129309; Community</button>
  <button class="filter-chip" onclick="filterBy('free',this)">&#10024; Free</button>
</div>
<div id="results-header" class="results-header" style="display:none">
  <span id="results-count" class="results-count"></span>
</div>
<div id="events-grid" class="events-grid"></div>
<script>
  let allEvents=[], currentFilter='all', currentView='grid', currentDate='today';
  const ICONS={music:'🎵',food:'🍽️',arts:'🎨',sports:'⚽',fitness:'💪',community:'🤝',nightlife:'🌙',film:'🎬',markets:'🛍️',outdoor:'🏔️',default:'⚡'};
  function getDateLabel(k){const n=new Date();if(k==='today')return 'Today';if(k==='tomorrow'){const t=new Date(n);t.setDate(t.getDate()+1);return t.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}if(k==='weekend')return 'This Weekend';if(k==='week')return 'This Week';return 'Today';}
  function getDateISO(k){const n=new Date();if(k==='today')return n.toISOString().split('T')[0];if(k==='tomorrow'){const t=new Date(n);t.setDate(t.getDate()+1);return t.toISOString().split('T')[0];}if(k==='weekend'){const d=n.getDay(),diff=d===6?0:(6-d),s=new Date(n);s.setDate(n.getDate()+diff);return s.toISOString().split('T')[0];}if(k==='week'){const m=new Date(n),d=n.getDay();m.setDate(n.getDate()-(d===0?6:d-1));return m.toISOString().split('T')[0];}return n.toISOString().split('T')[0];}
  function setDate(k,btn){currentDate=k;document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');doSearch();}
  function setView(v){currentView=v;document.getElementById('btn-grid').classList.toggle('active',v==='grid');document.getElementById('btn-list').classList.toggle('active',v==='list');document.getElementById('events-grid').classList.toggle('list-view',v==='list');}
  function handleKey(e){if(e.key==='Enter')doSearch();}
  function quickSearch(q){document.getElementById('search-input').value=q;doSearch();}
  function filterBy(cat,btn){currentFilter=cat;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');renderEvents();}
  function buildEventLink(e){if(e.url&&e.url.startsWith('http'))return e.url;return 'https://www.google.com/search?q='+encodeURIComponent((e.name||'')+' '+(e.venue||'')+' Calgary');}
  function renderEvents(){
    const grid=document.getElementById('events-grid');
    let events=currentFilter==='all'?allEvents:allEvents.filter(e=>{if(currentFilter==='free')return(e.price||'').toLowerCase()==='free';return[(e.category||''),...(e.tags||[]),(e.name||'')].join(' ').toLowerCase().includes(currentFilter);});
    document.getElementById('results-count').textContent=events.length+' events · '+getDateLabel(currentDate);
    if(!events.length){grid.innerHTML='<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-title">No events for this filter</div><div class="empty-sub">Try a different category</div></div>';return;}
    grid.innerHTML=events.map((e,i)=>{
      const icon=ICONS[(e.category||'').toLowerCase()]||ICONS.default;
      const tags=(e.tags||[]).slice(0,3).map(t=>'<span class="tag">#'+t+'</span>').join('');
      const isFree=!e.price||e.price.toLowerCase()==='free';
      const link=buildEventLink(e);
      const dl=currentDate==='today'?'Today':getDateLabel(currentDate);
      return '<a class="event-card" href="'+link+'" target="_blank" rel="noopener noreferrer">'+
        '<div class="card-top"><div class="card-category"><div class="cat-icon">'+icon+'</div><div><div class="cat-label">'+(e.category||'Event')+'</div><div class="cat-location">'+(e.neighbourhood||e.area||'Calgary')+'</div></div></div>'+
        '<div class="card-badges">'+(i<4||e.hot?'<div class="badge-hot">🔥</div>':'')+'</div></div>'+
        '<div class="card-body"><div class="event-name">'+e.name+'</div>'+(e.description?'<div class="event-desc">'+e.description+'</div>':'')+(tags?'<div class="event-tags">'+tags+'</div>':'')+'</div>'+
        '<div class="card-footer"><div><div class="event-venue">'+(e.venue||e.location||'')+'</div><div class="event-time">'+dl+' &middot; '+(e.time||'')+'</div><div class="event-link-hint">↗ View event</div></div>'+
        '<div class="event-price '+(isFree?'':'paid')+'">'+(isFree?'Free':e.price)+'</div></div></a>';
    }).join('');
  }
  async function doSearch(){
    const q=document.getElementById('search-input').value.trim()||'all events';
    const btn=document.getElementById('search-btn');
    const grid=document.getElementById('events-grid');
    const filterBar=document.getElementById('filter-bar');
    const resultsHeader=document.getElementById('results-header');
    btn.disabled=true;filterBar.style.display='none';resultsHeader.style.display='none';
    const dl=getDateLabel(currentDate);
    const sources=['Google Events','Eventbrite','Meetup','Lu.ma','Tourism YYC','Facebook','Ticketmaster','Reddit YYC','Live Nation','Arts Commons','Calgary Parks','Community Board'];
    grid.innerHTML='<div class="loading-state"><div class="spinner"></div><div class="loading-title">Finding events for '+dl+'...</div><div class="loading-sub">Checking live sources for "'+q+'" in Calgary</div><div class="source-chips">'+sources.map(s=>'<div class="source-chip" id="sc-'+s.replace(/[^a-z]/gi,'')+'">'+s+'</div>').join('')+'</div></div>';
    let d=0;for(const s of sources){setTimeout(()=>{const el=document.getElementById('sc-'+s.replace(/[^a-z]/gi,''));if(el)el.classList.add('done');},d);d+=160;}
    try{
      const res=await fetch('/api/scrape',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({city:'Calgary',query:q,date:getDateISO(currentDate),dateRange:currentDate})});
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      allEvents=data.events||[];currentFilter='all';
      document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
      document.querySelector('.filter-chip').classList.add('active');
      filterBar.style.display='flex';resultsHeader.style.display='flex';renderEvents();
    }catch(err){
      grid.innerHTML='<div class="error-msg">⚠️ '+(err.message||'Could not load events.')+'</div><div class="empty-state"><div class="empty-emoji">😔</div><div class="empty-title">Something went wrong</div><div class="empty-sub">Check your connection and try again</div></div>';
    }
    btn.disabled=false;
  }
</script>
</body>
</html>
